<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Animate Style -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/undangan1.css">
</head>

<body>
    <div class="cover" id="coverScreen">
        <span class="animate__animated animate__zoomIn animate__delay-1s"
            style="--animate-delay: 1s; --animate-duration: 1.2s;">The Wedding
            Of</span>
        <h1 class="great-vibes animate__animated animate__zoomIn animate__delay-1s"
            style="--animate-delay: 1.5s; --animate-duration: 1.5s;">
            Fernanda&nbsp;&nbsp;&&nbsp;&nbsp;Who?</h1>

        <button id="btnOpen" class="animate__animated animate__zoomIn animate__delay-1s"
            style="--animate-delay: 1.7s; --animate-duration: 1.7s;"><i class="bi bi-envelope-open-fill"></i> Buka
            Undangan
        </button>
    </div>

    <div class="invitation" id="invitation">
        <span id="musicToggle" class="music-toggle" type="button" aria-pressed="false"></span>

        <section class="save-date">
            <span class="animate__animated animate__zoomIn animate__delay-1s"
                style="--animate-delay: 1.3s; --animate-duration: 1s; font-size: 20px;">The Wedding Of</span>
            <h1 class="great-vibes animate__animated animate__zoomIn animate__delay-1s"
                style="--animate-delay: 1.6s; --animate-duration: 1.6s;">
                Fernanda&nbsp;&nbsp;&&nbsp;&nbsp;Who?</h3>
                <span class="text-center animate__animated animate__zoomIn animate__delay-1s"
                    style="--animate-delay: 2s; --animte-duration: 2s;">Kami berharap Anda menjadi
                    bagian dari hari istimewa kami.</span>
        </section>

        <section class="opening-couple"></section>

        <section class="date-locate"></section>

        <section class="gallery"></section>

        <section class="story"></section>

        <section class="gift"></section>

        <section class="message"></section>

        <section class="closing"></section>

        <footer></footer>

        <audio id="weddingMusic" loop>
            <source
                src="https://inv.rumahundangan.id/wp-content/uploads/2024/09/Tiara-Andini-Arsy-Widianto-Lagu-Pernikahan-Kita-1.53.mp3"
                type="audio/mp3">
        </audio>
    </div>

    <script src="../js/undangan1.js"></script>

</body>

</html>
